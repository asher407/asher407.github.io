<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>前导测试入口</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700;900&display=swap");

      :root {
        --ink: #18212b;
        --paper: #fffdf6;
        --mint: #2f8f83;
        --coral: #dc5d4b;
        --warm: #f3b763;
        --mist: #dbe7e4;
        --card-shadow: 0 20px 50px rgba(24, 33, 43, 0.16);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        min-height: 100vh;
        background:
          radial-gradient(
            circle at 15% 15%,
            rgba(220, 93, 75, 0.16) 0%,
            transparent 35%
          ),
          radial-gradient(
            circle at 85% 20%,
            rgba(47, 143, 131, 0.2) 0%,
            transparent 40%
          ),
          linear-gradient(145deg, #fff9ed 0%, #f4f9f8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        overflow-x: hidden;
      }

      .container {
        width: min(100%, 1040px);
        background: rgba(255, 253, 246, 0.85);
        border: 1px solid rgba(24, 33, 43, 0.08);
        border-radius: 24px;
        box-shadow: var(--card-shadow);
        backdrop-filter: blur(4px);
        padding: 42px 28px 34px;
        animation: rise-in 0.7s ease both;
      }

      .title {
        font-family: "ZCOOL XiaoWei", "KaiTi", serif;
        font-size: clamp(32px, 5vw, 52px);
        text-align: center;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }

      .subtitle {
        text-align: center;
        color: #3f4c5a;
        margin-bottom: 28px;
        font-size: clamp(14px, 2.2vw, 18px);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      .card {
        position: relative;
        border-radius: 20px;
        background: white;
        border: 1px solid rgba(24, 33, 43, 0.08);
        padding: 24px;
        overflow: hidden;
        transition:
          transform 0.28s ease,
          box-shadow 0.28s ease,
          border-color 0.28s ease;
        animation: fade-up 0.7s ease both;
      }

      .card:nth-child(1) {
        animation-delay: 0.1s;
      }

      .card:nth-child(2) {
        animation-delay: 0.2s;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.12;
        pointer-events: none;
      }

      .card-1::before {
        background: linear-gradient(130deg, var(--coral), transparent 55%);
      }

      .card-2::before {
        background: linear-gradient(130deg, var(--mint), transparent 55%);
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 14px 32px rgba(24, 33, 43, 0.16);
      }

      .tag {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        color: white;
        border-radius: 999px;
        padding: 6px 12px;
        margin-bottom: 14px;
      }

      .card-1 .tag {
        background: linear-gradient(90deg, #dc5d4b, #f07d52);
      }

      .card-2 .tag {
        background: linear-gradient(90deg, #2f8f83, #4eb49f);
      }

      .card h2 {
        font-size: 24px;
        margin-bottom: 8px;
      }

      .card p {
        color: #4e5d6d;
        line-height: 1.65;
        min-height: 74px;
        margin-bottom: 18px;
      }

      .enter {
        border: none;
        border-radius: 12px;
        padding: 12px 18px;
        font-size: 15px;
        font-weight: 700;
        color: white;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          filter 0.2s ease;
      }

      .enter:hover {
        transform: translateY(-2px);
        filter: brightness(1.05);
      }

      .card-1 .enter {
        background: linear-gradient(90deg, #dc5d4b, #f07d52);
      }

      .card-2 .enter {
        background: linear-gradient(90deg, #2f8f83, #4eb49f);
      }

      .footnote {
        margin-top: 24px;
        text-align: center;
        color: #5d6b79;
        font-size: 13px;
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 820px) {
        .container {
          padding: 28px 18px 24px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .card p {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1 class="title">前导测试统一入口</h1>
      <p class="subtitle">请选择要进入的测试。</p>

      <section class="grid">
        <article class="card card-1">
          <span class="tag">前导1</span>
          <h2>组队基因测试</h2>
          <p>进入团队角色测评，获得你在协作中的角色定位与优势画像。</p>
          <button class="enter" onclick="goToGuide1()">进入前导1</button>
        </article>

        <article class="card card-2">
          <span class="tag">前导2</span>
          <h2>职业主战场测试</h2>
          <p>进入职业倾向测评，识别你更适配的职业环境与发展方向。</p>
          <button class="enter" onclick="goToGuide2()">进入前导2</button>
        </article>
      </section>

      <p class="footnote">"英途优"平台官方前导测试</p>
    </main>

    <script>
      function goToGuide1() {
        window.location.href = "./前导1/前导1/team_gene_test.html";
      }

      function goToGuide2() {
        window.location.href = "./前导2/前导2/index.html";
      }
    </script>
  </body>
</html>
