<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>团队角色结果 - Team Role Result</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary-color: #7c3aed;
        --secondary-color: #ec4899;
        --accent-color: #f59e0b;
        --text-color: #1f2937;
        --light-text: #6b7280;
        --background-color: #fafafa;
        --card-color: #ffffff;
        --border-color: #e5e7eb;
        --success-color: #10b981;
        --warning-color: #f59e0b;
        --error-color: #ef4444;
        --gradient-soft: linear-gradient(135deg, #f5f3ff 0%, #fdf2f8 100%);
        --gradient-primary: linear-gradient(135deg, #7c3aed, #ec4899);
        --gradient-accent: linear-gradient(135deg, #f59e0b, #f97316);
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md:
          0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-xl:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
        --shadow-glow: 0 0 40px rgba(124, 58, 237, 0.15);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: var(--gradient-soft);
        color: var(--text-color);
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .result-wrapper {
        width: 100%;
        max-width: 900px;
        background: var(--card-color);
        border-radius: 32px;
        box-shadow: var(--shadow-xl), var(--shadow-glow);
        overflow: hidden;
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-header {
        background: var(--gradient-primary);
        padding: 50px 40px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .result-header::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.15) 0%,
          rgba(255, 255, 255, 0) 70%
        );
        animation: shimmer 8s ease-in-out infinite;
      }

      @keyframes shimmer {
        0%,
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
        50% {
          transform: translate(10%, 10%) rotate(5deg);
        }
      }

      .result-title {
        font-size: 2.8rem;
        font-weight: 800;
        color: white;
        margin-bottom: 12px;
        position: relative;
        z-index: 1;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        letter-spacing: -0.5px;
      }

      .result-subtitle {
        font-size: 1.3rem;
        color: rgba(255, 255, 255, 0.9);
        position: relative;
        z-index: 1;
        font-weight: 500;
      }

      .result-content {
        padding: 60px 40px;
        text-align: center;
      }

      .result-image-container {
        position: relative;
        margin: 0 auto 50px;
        max-width: 540px;
      }

      .result-image {
        width: 100%;
        max-width: 540px;
        height: auto;
        object-fit: contain;
        border-radius: 24px;
        box-shadow: var(--shadow-xl);
        display: block;
        border: 6px solid white;
        transition:
          transform 0.4s ease,
          box-shadow 0.4s ease;
      }

      .result-image:hover {
        transform: scale(1.03);
        box-shadow: var(--shadow-xl), var(--shadow-glow);
      }

      .result-image-container::before {
        content: "";
        position: absolute;
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px;
        background: var(--gradient-primary);
        border-radius: 32px;
        opacity: 0.1;
        z-index: -1;
        filter: blur(20px);
      }

      .result-actions {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 18px 40px;
        border: none;
        border-radius: 16px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        min-width: 180px;
      }

      .btn-primary {
        background: var(--gradient-primary);
        color: white;
        box-shadow: var(--shadow-lg);
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-xl), var(--shadow-glow);
      }

      .btn-secondary {
        background: white;
        color: var(--primary-color);
        border: 2px solid var(--primary-color);
        box-shadow: var(--shadow-md);
      }

      .btn-secondary:hover {
        background: var(--gradient-primary);
        color: white;
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
      }

      .btn:active {
        transform: translateY(-1px);
      }

      .decorative-dots {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        opacity: 0.3;
      }

      .dot {
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      .dot:nth-child(4) {
        animation-delay: 0.6s;
      }
      .dot:nth-child(5) {
        animation-delay: 0.8s;
      }
      .dot:nth-child(6) {
        animation-delay: 1s;
      }
      .dot:nth-child(7) {
        animation-delay: 1.2s;
      }
      .dot:nth-child(8) {
        animation-delay: 1.4s;
      }
      .dot:nth-child(9) {
        animation-delay: 1.6s;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.8;
          transform: scale(1.2);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }

      @keyframes fadeOutDown {
        from {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
        to {
          opacity: 0;
          transform: translateX(-50%) translateY(20px);
        }
      }

      /* 分享弹窗样式 */
      .share-modal {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
        animation: fadeIn 0.3s ease;
      }

      .share-modal-content {
        background: white;
        border-radius: 24px;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow: hidden;
        box-shadow: var(--shadow-xl);
        animation: slideUp 0.3s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .share-modal-header {
        background: var(--gradient-primary);
        padding: 20px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .share-modal-header h3 {
        color: white;
        font-size: 1.3rem;
        font-weight: 600;
        margin: 0;
      }

      .close-btn {
        background: none;
        border: none;
        color: white;
        font-size: 1.8rem;
        cursor: pointer;
        padding: 0;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: background 0.3s ease;
      }

      .close-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .share-modal-body {
        padding: 24px;
        overflow-y: auto;
        max-height: calc(90vh - 80px);
      }

      .share-preview {
        text-align: center;
        margin-bottom: 24px;
        padding: 20px;
        background: linear-gradient(135deg, #f5f3ff 0%, #fdf2f8 100%);
        border-radius: 16px;
      }

      .share-preview img {
        width: 100%;
        max-width: 280px;
        height: auto;
        border-radius: 12px;
        box-shadow: var(--shadow-lg);
        border: 4px solid white;
        margin-bottom: 12px;
      }

      .share-text {
        font-size: 1rem;
        color: var(--text-color);
        font-weight: 500;
        margin: 0;
      }

      .share-link-section {
        margin-bottom: 24px;
      }

      .share-link-section label {
        display: block;
        font-size: 0.9rem;
        color: var(--light-text);
        margin-bottom: 8px;
        font-weight: 500;
      }

      .link-container {
        display: flex;
        gap: 10px;
      }

      .link-container input {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid var(--border-color);
        border-radius: 10px;
        font-size: 0.9rem;
        color: var(--text-color);
        background: var(--background-color);
      }

      .copy-btn {
        padding: 12px 20px;
        background: var(--gradient-primary);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
      }

      .copy-btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      .share-buttons {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .share-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 16px 12px;
        border: 2px solid var(--border-color);
        border-radius: 12px;
        background: white;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .share-btn:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-md);
        border-color: var(--primary-color);
      }

      .share-btn .icon {
        font-size: 1.8rem;
      }

      .share-btn span:last-child {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-color);
      }

      .share-btn.wechat:hover {
        border-color: #07c160;
        background: rgba(7, 193, 96, 0.05);
      }

      .share-btn.weibo:hover {
        border-color: #e6162d;
        background: rgba(230, 22, 45, 0.05);
      }

      .share-btn.qq:hover {
        border-color: #12b7f5;
        background: rgba(18, 183, 245, 0.05);
      }

      .share-btn.download:hover {
        border-color: var(--primary-color);
        background: rgba(124, 58, 237, 0.05);
      }

      @media (max-width: 768px) {
        .result-wrapper {
          border-radius: 24px;
        }

        .result-header {
          padding: 40px 30px;
        }

        .result-title {
          font-size: 2.2rem;
        }

        .result-subtitle {
          font-size: 1.1rem;
        }

        .result-content {
          padding: 40px 30px;
        }

        .result-image {
          max-width: 90%;
        }

        .result-actions {
          flex-direction: column;
          align-items: center;
        }

        .btn {
          width: 100%;
          max-width: 300px;
        }

        .share-modal-content {
          width: 95%;
          border-radius: 20px;
        }

        .share-buttons {
          grid-template-columns: repeat(2, 1fr);
        }

        .link-container {
          flex-direction: column;
        }

        .copy-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="result-wrapper">
      <div class="result-header">
        <div class="decorative-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <h1 class="result-title" id="result-title">你的团队角色</h1>
        <p class="result-subtitle" id="result-subtitle">找到你的团队舒适区</p>
      </div>

      <div class="result-content">
        <div class="result-image-container">
          <img class="result-image" id="result-image" src="" alt="结果图片" />
        </div>

        <div class="result-actions">
          <button class="btn btn-secondary" onclick="goBack()">返回测试</button>
          <button class="btn btn-primary" onclick="openShareModal()">
            分享结果
          </button>
        </div>
      </div>
    </div>

    <!-- 分享弹窗 -->
    <div id="share-modal" class="share-modal" style="display: none">
      <div class="share-modal-content">
        <div class="share-modal-header">
          <h3>分享你的团队角色</h3>
          <button class="close-btn" onclick="closeShareModal()">&times;</button>
        </div>
        <div class="share-modal-body">
          <div class="share-preview">
            <img id="share-image" src="" alt="分享图片" />
            <p class="share-text" id="share-text"></p>
          </div>
          <div class="share-options">
            <div class="share-link-section">
              <label>测试链接：</label>
              <div class="link-container">
                <input type="text" id="test-link" readonly value="" />
                <button class="copy-btn" onclick="copyLink()">复制链接</button>
              </div>
            </div>
            <div class="share-buttons">
              <button class="share-btn wechat" onclick="shareToWeChat()">
                <span class="icon">📱</span>
                <span>微信</span>
              </button>
              <button class="share-btn weibo" onclick="shareToWeibo()">
                <span class="icon">📢</span>
                <span>微博</span>
              </button>
              <button class="share-btn qq" onclick="shareToQQ()">
                <span class="icon">💬</span>
                <span>QQ</span>
              </button>
              <button class="share-btn download" onclick="downloadImage()">
                <span class="icon">💾</span>
                <span>保存图片</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 获取URL参数
      function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
      }

      // 当前角色和图片路径
      let currentRole = "";
      let currentImagePath = "";

      // 页面加载时显示结果
      window.onload = function () {
        const role = getQueryParam("role");
        currentRole = role;

        if (role) {
          document.getElementById("result-title").textContent =
            `你的团队角色：${role}`;

          const imageMap = {
            思维破局者: "前导1图像/思维破局者.jpg",
            航线主理人: "前导1图像/航线主理人.jpg",
            理性监督员: "前导1图像/理性监督员.jpg",
            团队粘合剂: "前导1图像/团队粘合剂.jpg",
            自律实干家: "前导1图像/蓝图实现师.jpg",
            细节质检官: "前导1图像/细节质检官.jpg",
          };

          if (imageMap[role]) {
            currentImagePath = imageMap[role];
            document.getElementById("result-image").src = currentImagePath;
          }
        }

        // 设置测试链接
        const testUrl = new URL("team_gene_test.html", window.location.href)
          .href;
        document.getElementById("test-link").value = testUrl;
      };

      // 返回测试页面
      function goBack() {
        window.location.href = "team_gene_test.html";
      }

      // 打开分享弹窗
      function openShareModal() {
        const modal = document.getElementById("share-modal");
        const shareImage = document.getElementById("share-image");
        const shareText = document.getElementById("share-text");

        // 设置分享图片和文字
        shareImage.src = currentImagePath;
        shareText.textContent = `我是「${currentRole}」，快来测测你的团队角色吧！`;

        modal.style.display = "flex";
        document.body.style.overflow = "hidden";
      }

      // 关闭分享弹窗
      function closeShareModal() {
        const modal = document.getElementById("share-modal");
        modal.style.display = "none";
        document.body.style.overflow = "auto";
      }

      // 点击弹窗外部关闭
      document
        .getElementById("share-modal")
        .addEventListener("click", function (e) {
          if (e.target === this) {
            closeShareModal();
          }
        });

      // 复制链接
      function copyLink() {
        const linkInput = document.getElementById("test-link");
        linkInput.select();
        linkInput.setSelectionRange(0, 99999);

        if (navigator.clipboard) {
          navigator.clipboard
            .writeText(linkInput.value)
            .then(() => {
              showToast("链接已复制到剪贴板！");
            })
            .catch(() => {
              document.execCommand("copy");
              showToast("链接已复制到剪贴板！");
            });
        } else {
          document.execCommand("copy");
          showToast("链接已复制到剪贴板！");
        }
      }

      // 分享到微信
      function shareToWeChat() {
        const shareContent = `我是「${currentRole}」，快来测测你的团队角色吧！\n\n测试链接：${document.getElementById("test-link").value}`;

        if (navigator.share) {
          navigator
            .share({
              title: "团队角色测试结果",
              text: shareContent,
              url: window.location.href,
            })
            .catch(() => {
              copyToClipboard(shareContent);
            });
        } else {
          copyToClipboard(shareContent);
        }
      }

      // 分享到微博
      function shareToWeibo() {
        const shareContent = `我是「${currentRole}」，快来测测你的团队角色吧！`;
        const testUrl = document.getElementById("test-link").value;
        const imageUrl = new URL(currentImagePath, window.location.href).href;
        const weiboUrl = `https://service.weibo.com/share/share.php?title=${encodeURIComponent(shareContent)}&url=${encodeURIComponent(testUrl)}&pic=${encodeURIComponent(imageUrl)}`;
        window.open(weiboUrl, "_blank", "width=600,height=400");
      }

      // 分享到QQ
      function shareToQQ() {
        const shareContent = `我是「${currentRole}」，快来测测你的团队角色吧！`;
        const testUrl = document.getElementById("test-link").value;
        const imageUrl = new URL(currentImagePath, window.location.href).href;
        const qqUrl = `https://connect.qq.com/widget/shareqq/index.html?title=${encodeURIComponent("团队角色测试结果")}&desc=${encodeURIComponent(shareContent)}&url=${encodeURIComponent(testUrl)}&pics=${encodeURIComponent(imageUrl)}`;
        window.open(qqUrl, "_blank", "width=600,height=400");
      }

      // 下载图片
      function downloadImage() {
        const link = document.createElement("a");
        link.href = currentImagePath;
        link.download = `团队角色_${currentRole}.jpg`;
        link.target = "_blank";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("图片下载中...");
      }

      // 复制到剪贴板
      function copyToClipboard(text) {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(() => {
            showToast("分享内容已复制，请粘贴到微信发送");
          });
        } else {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);
          showToast("分享内容已复制，请粘贴到微信发送");
        }
      }

      // 显示提示
      function showToast(message) {
        const existingToast = document.querySelector(".toast-message");
        if (existingToast) {
          existingToast.remove();
        }

        const toast = document.createElement("div");
        toast.className = "toast-message";
        toast.textContent = message;
        toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0,0,0,0.8);
                color: white;
                padding: 12px 24px;
                border-radius: 25px;
                font-size: 14px;
                z-index: 10000;
                animation: fadeInUp 0.3s ease;
            `;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.style.animation = "fadeOutDown 0.3s ease";
          setTimeout(() => toast.remove(), 300);
        }, 2500);
      }
    </script>
  </body>
</html>
